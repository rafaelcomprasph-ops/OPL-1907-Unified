      - name: Install + Patch + Build
        run: |
          apk add --no-cache make python3 git curl
          cd Open-PS2-Loader

          # Fix 1: Criar repo git para o Makefile detectar versão
          git config --global user.email "build@ci.com"
          git config --global user.name "CI"
          git init
          git add .
          git commit -m "build"

          # Fix 2: Criar script de idiomas vazio (não precisamos de idiomas agora)
          echo '#!/bin/sh' > download_lng.sh
          chmod +x download_lng.sh

          # Patches do Menu Unificado
          sed -i 's/initSupport(appGetObject(0), APP_MODE, force_reinit);/\/\/ initSupport(appGetObject(0), APP_MODE, force_reinit);/' src/opl.c
          sed -i 's/return bdmGameCount;/return bdmUnifiedCount;/' src/bdmsupport.c

          # Compilar!
          make clean
          make -j$(nproc)
