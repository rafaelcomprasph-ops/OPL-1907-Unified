name: Build OPL Unified 2022

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: ps2dev/ps2dev:v1.0

    steps:
      - name: Checkout Custom Repo (Patches)
        uses: actions/checkout@v4
        with:
          path: custom_repo

      - name: Checkout OPL Source (Version 48e2d13)
        uses: actions/checkout@v4
        with:
          repository: ps2homebrew/Open-PS2-Loader
          ref: 48e2d132532088aaba8e82c7149e4c4164d0ac64
          path: Open-PS2-Loader

      - name: Install Python (Necessário para o Patch)
        run: |
          apt-get update && apt-get install -y python3

      - name: Apply Unified Menu Patch
        run: |
          cp custom_repo/patch_opl_1907.py Open-PS2-Loader/
          cd Open-PS2-Loader
          python3 patch_opl_1907.py

      - name: Build OPL
        run: |
          cd Open-PS2-Loader
          make clean
          make -j$(nproc)

      - name: Upload OPNPS2LD.ELF
        uses: actions/upload-artifact@v4
        with:
          name: OPL-Unified-2022
          path: Open-PS2-Loader/OPNPS2LD.ELF
