name: Build OPL Unified 2022 (Modern Build)

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: ps2dev/ps2dev:latest  # VOLTAMOS PARA A LATEST (TEM TUDO)

    steps:
      - name: Checkout Custom Repo
        uses: actions/checkout@v4
        with:
          path: custom_repo

      - name: Checkout OPL Source
        uses: actions/checkout@v4
        with:
          repository: ps2homebrew/Open-PS2-Loader
          ref: 48e2d132532088aaba8e82c7149e4c4164d0ac64
          path: Open-PS2-Loader

      - name: Apply Unified Menu Patch
        run: |
          cp custom_repo/patch_opl_1907.py Open-PS2-Loader/
          cd Open-PS2-Loader
          python3 patch_opl_1907.py

      - name: Force Legacy Compatibility (GCC 14 Fix)
        run: |
          # Essas linhas ensinam o compilador novo a aceitar o código de 2022
          sed -i 's/EE_CFLAGS :=/EE_CFLAGS := -Wno-error=incompatible-pointer-types -Wno-error=int-conversion -Wno-error=implicit-function-declaration /' Open-PS2-Loader/Makefile
          sed -i 's/IOP_CFLAGS :=/IOP_CFLAGS := -Wno-error=incompatible-pointer-types -Wno-error=int-conversion -Wno-error=implicit-function-declaration /' Open-PS2-Loader/Makefile

      - name: Build OPL
        run: |
          cd Open-PS2-Loader
          make clean
          make -j$(nproc)

      - name: Upload OPNPS2LD.ELF
        uses: actions/upload-artifact@v4
        with:
          name: OPL-Unified-2022
          path: Open-PS2-Loader/OPNPS2LD.ELF
