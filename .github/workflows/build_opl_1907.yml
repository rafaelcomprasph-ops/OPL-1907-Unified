name: Build OPL Unified 2022 (Fixed)

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: ps2dev/ps2dev:latest

    steps:
      - name: Checkout Custom Repo
        uses: actions/checkout@v4
        with:
          path: custom_repo

      - name: Checkout OPL Source (2022)
        uses: actions/checkout@v4
        with:
          repository: ps2homebrew/Open-PS2-Loader
          ref: 48e2d132532088aaba8e82c7149e4c4164d0ac64
          path: Open-PS2-Loader

      - name: Build OPL
        run: |
          cd Open-PS2-Loader
          # Aplicar o patch usando o python que já vem na imagem
          python3 ../custom_repo/patch_opl_1907.py
          
          # Forçar compatibilidade com código antigo
          export EE_CFLAGS="-Wno-error=incompatible-pointer-types -Wno-error=int-conversion -Wno-error=implicit-function-declaration"
          export IOP_CFLAGS="-Wno-error=incompatible-pointer-types -Wno-error=int-conversion -Wno-error=implicit-function-declaration"
          
          make clean
          make -j$(nproc)

      - name: Upload OPNPS2LD.ELF
        uses: actions/upload-artifact@v4
        with:
          name: OPL-Unified-2022
          path: Open-PS2-Loader/OPNPS2LD.ELF
